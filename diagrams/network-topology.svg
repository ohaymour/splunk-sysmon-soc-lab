<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Calibri, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1F3864"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="560" fill="#ffffff"/>

  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1F3864">Security Monitoring Lab — Network Topology</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#595959">Stealthwork lab (DC01/FS01) extended with SPLK01 (Splunk indexer)</text>

  <!-- Host PC -->
  <rect x="360" y="90" width="180" height="55" rx="6" fill="#EDEFF3" stroke="#1F3864" stroke-width="1.5"/>
  <text x="450" y="113" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">Host PC</text>
  <text x="450" y="130" text-anchor="middle" font-size="11" fill="#595959">192.168.10.1 (VMnet2)</text>

  <!-- VMnet2 bus -->
  <line x1="100" y1="180" x2="800" y2="180" stroke="#1F3864" stroke-width="2"/>
  <text x="450" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#1F3864">VMnet2 — Host-Only Network — 192.168.10.0/24</text>
  <line x1="450" y1="145" x2="450" y2="180" stroke="#1F3864" stroke-width="1.5"/>

  <!-- DC01 -->
  <rect x="80" y="230" width="200" height="110" rx="6" fill="#F4F8FF" stroke="#1F3864" stroke-width="1.5"/>
  <text x="180" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">DC01</text>
  <text x="180" y="272" text-anchor="middle" font-size="11" fill="#595959">192.168.10.10</text>
  <text x="180" y="290" text-anchor="middle" font-size="10.5" fill="#595959">Domain Controller, DNS,</text>
  <text x="180" y="303" text-anchor="middle" font-size="10.5" fill="#595959">WSUS, GPO Management</text>
  <text x="180" y="322" text-anchor="middle" font-size="10.5" fill="#2E7D32" font-weight="bold">+ NAT adapter (internet, WSUS)</text>
  <line x1="180" y1="230" x2="180" y2="180" stroke="#1F3864" stroke-width="1.5"/>

  <!-- FS01 -->
  <rect x="350" y="230" width="200" height="110" rx="6" fill="#F4F8FF" stroke="#1F3864" stroke-width="1.5"/>
  <text x="450" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">FS01</text>
  <text x="450" y="272" text-anchor="middle" font-size="11" fill="#595959">192.168.10.20</text>
  <text x="450" y="290" text-anchor="middle" font-size="10.5" fill="#595959">File Server</text>
  <text x="450" y="303" text-anchor="middle" font-size="10.5" fill="#595959">IT$ / Finance$ / HR$ / Common$</text>
  <text x="450" y="322" text-anchor="middle" font-size="10.5" fill="#8A6D00" font-weight="bold">No internet (by design)</text>
  <line x1="450" y1="230" x2="450" y2="180" stroke="#1F3864" stroke-width="1.5"/>

  <!-- SPLK01 -->
  <rect x="620" y="230" width="200" height="110" rx="6" fill="#F4F8FF" stroke="#1F3864" stroke-width="1.5"/>
  <text x="720" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">SPLK01</text>
  <text x="720" y="272" text-anchor="middle" font-size="11" fill="#595959">192.168.10.30</text>
  <text x="720" y="290" text-anchor="middle" font-size="10.5" fill="#595959">Ubuntu Server 26.04</text>
  <text x="720" y="303" text-anchor="middle" font-size="10.5" fill="#595959">Splunk Enterprise Indexer</text>
  <text x="720" y="322" text-anchor="middle" font-size="10.5" fill="#2E7D32" font-weight="bold">+ NAT adapter (internet, downloads)</text>
  <line x1="720" y1="230" x2="720" y2="180" stroke="#1F3864" stroke-width="1.5"/>

  <!-- Forwarder flows -->
  <path d="M 180 340 L 180 400 L 700 400 L 700 340" fill="none" stroke="#1F3864" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 450 340 L 450 400" fill="none" stroke="#1F3864" stroke-width="1.5"/>
  <text x="450" y="420" text-anchor="middle" font-size="11" fill="#1F3864" font-weight="bold">Splunk Universal Forwarder → TCP 9997</text>

  <!-- Splunk box below -->
  <rect x="600" y="440" width="240" height="90" rx="6" fill="#1F3864"/>
  <text x="720" y="465" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Splunk Enterprise</text>
  <text x="720" y="483" text-anchor="middle" font-size="11" fill="#DCE3F0">Indexes: wineventlog, sysmon</text>
  <text x="720" y="500" text-anchor="middle" font-size="11" fill="#DCE3F0">4 detections + dashboard</text>
  <text x="720" y="517" text-anchor="middle" font-size="10" fill="#B7C4DC">Port 9997 (receiving) · 8000 (web UI)</text>

  <!-- Legend -->
  <rect x="60" y="440" width="14" height="14" fill="#2E7D32"/>
  <text x="80" y="451" font-size="11" fill="#595959">Has internet access (NAT adapter)</text>
  <rect x="60" y="465" width="14" height="14" fill="#8A6D00"/>
  <text x="80" y="476" font-size="11" fill="#595959">Isolated — no internet (by design)</text>
</svg>
