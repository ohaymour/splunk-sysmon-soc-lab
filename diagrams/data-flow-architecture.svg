<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Calibri, Arial, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1F3864"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="620" fill="#ffffff"/>

  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1F3864">Security Monitoring Lab — Data Flow</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#595959">From endpoint log generation to detections and dashboard</text>

  <!-- DC01 source -->
  <rect x="60" y="90" width="230" height="95" rx="6" fill="#F4F8FF" stroke="#1F3864" stroke-width="1.5"/>
  <text x="175" y="113" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">DC01</text>
  <text x="175" y="131" text-anchor="middle" font-size="10.5" fill="#595959">Windows Event Log</text>
  <text x="175" y="146" text-anchor="middle" font-size="10.5" fill="#595959">(Security / System / Application)</text>
  <text x="175" y="164" text-anchor="middle" font-size="10.5" fill="#595959">+ Sysmon (SwiftOnSecurity config)</text>

  <!-- FS01 source -->
  <rect x="610" y="90" width="230" height="95" rx="6" fill="#F4F8FF" stroke="#1F3864" stroke-width="1.5"/>
  <text x="725" y="113" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">FS01</text>
  <text x="725" y="131" text-anchor="middle" font-size="10.5" fill="#595959">Windows Event Log</text>
  <text x="725" y="146" text-anchor="middle" font-size="10.5" fill="#595959">(Security / System / Application)</text>
  <text x="725" y="164" text-anchor="middle" font-size="10.5" fill="#595959">+ Sysmon (SwiftOnSecurity config)</text>

  <!-- Forwarders -->
  <rect x="80" y="220" width="190" height="55" rx="6" fill="#EDEFF3" stroke="#1F3864" stroke-width="1.2"/>
  <text x="175" y="243" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#222">Splunk Universal Forwarder</text>
  <text x="175" y="260" text-anchor="middle" font-size="10" fill="#595959">inputs.conf → 4 monitored channels</text>

  <rect x="630" y="220" width="190" height="55" rx="6" fill="#EDEFF3" stroke="#1F3864" stroke-width="1.2"/>
  <text x="725" y="243" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#222">Splunk Universal Forwarder</text>
  <text x="725" y="260" text-anchor="middle" font-size="10" fill="#595959">inputs.conf → 4 monitored channels</text>

  <line x1="175" y1="185" x2="175" y2="220" stroke="#1F3864" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="725" y1="185" x2="725" y2="220" stroke="#1F3864" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Convergence to SPLK01 -->
  <path d="M 175 275 L 175 320 L 450 320" fill="none" stroke="#1F3864" stroke-width="1.5"/>
  <path d="M 725 275 L 725 320 L 450 320" fill="none" stroke="#1F3864" stroke-width="1.5"/>
  <line x1="450" y1="320" x2="450" y2="345" stroke="#1F3864" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="450" y="305" text-anchor="middle" font-size="11" font-weight="bold" fill="#1F3864">TCP 9997</text>

  <!-- SPLK01 indexer -->
  <rect x="290" y="350" width="320" height="80" rx="6" fill="#1F3864"/>
  <text x="450" y="378" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">SPLK01 — Splunk Enterprise Indexer</text>
  <text x="450" y="397" text-anchor="middle" font-size="11" fill="#DCE3F0">Indexes: wineventlog · sysmon</text>
  <text x="450" y="414" text-anchor="middle" font-size="10" fill="#B7C4DC">Ubuntu Server 26.04 · 192.168.10.30</text>

  <line x1="450" y1="430" x2="450" y2="455" stroke="#1F3864" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Detections row -->
  <rect x="60" y="460" width="185" height="70" rx="6" fill="#F4F8FF" stroke="#1F3864" stroke-width="1.2"/>
  <text x="152" y="480" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#222">Repeated Failed</text>
  <text x="152" y="494" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#222">Logons</text>
  <text x="152" y="512" text-anchor="middle" font-size="9.5" fill="#595959">T1110 — Brute Force</text>

  <rect x="260" y="460" width="185" height="70" rx="6" fill="#F4F8FF" stroke="#1F3864" stroke-width="1.2"/>
  <text x="352" y="480" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#222">Privileged Group</text>
  <text x="352" y="494" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#222">Change</text>
  <text x="352" y="512" text-anchor="middle" font-size="9.5" fill="#595959">T1098 — Account Manipulation</text>

  <rect x="460" y="460" width="185" height="70" rx="6" fill="#F4F8FF" stroke="#1F3864" stroke-width="1.2"/>
  <text x="552" y="480" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#222">Suspicious</text>
  <text x="552" y="494" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#222">PowerShell</text>
  <text x="552" y="512" text-anchor="middle" font-size="9.5" fill="#595959">T1059.001 — PowerShell</text>

  <rect x="660" y="460" width="185" height="70" rx="6" fill="#F4F8FF" stroke="#1F3864" stroke-width="1.2"/>
  <text x="752" y="480" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#222">External RDP</text>
  <text x="752" y="494" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#222">Logon</text>
  <text x="752" y="512" text-anchor="middle" font-size="9.5" fill="#595959">Ties to Lab-RDP-Hardening GPO</text>

  <!-- connectors from indexer to detections -->
  <path d="M 400 430 L 400 445 L 152 445 L 152 460" fill="none" stroke="#8A98B8" stroke-width="1.2"/>
  <path d="M 420 430 L 420 445 L 352 445 L 352 460" fill="none" stroke="#8A98B8" stroke-width="1.2"/>
  <path d="M 480 430 L 480 445 L 552 445 L 552 460" fill="none" stroke="#8A98B8" stroke-width="1.2"/>
  <path d="M 500 430 L 500 445 L 752 445 L 752 460" fill="none" stroke="#8A98B8" stroke-width="1.2"/>

  <!-- Dashboard -->
  <line x1="450" y1="530" x2="450" y2="555" stroke="#1F3864" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <rect x="300" y="560" width="300" height="50" rx="6" fill="#2E7D32"/>
  <text x="450" y="591" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Dashboard: Security Monitoring Overview</text>
</svg>
